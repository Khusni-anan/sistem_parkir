<!DOCTYPE html>
<html lang="id">
<head> 
    <meta charset="UTF-8">
    <title>Monitoring CCTV & Cetak Tiket</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1450px; margin: auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        .top-bar { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        button { padding: 12px 25px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-setup { background-color: #17a2b8; }
        .btn-setup:hover { background-color: #138496; transform: translateY(-2px); }
        .btn-connect { background-color: #28a745; }
        .btn-connect:hover { background-color: #218838; transform: translateY(-2px); }
        .btn-ticket { background-color: #ffc107; color: #222; }
        .btn-ticket:hover { background-color: #e0a800; transform: translateY(-2px); }
        .btn-action { background-color: #dc3545; padding: 8px 15px; font-size: 13px;}
        
        /* Layout Utama */
        .main-layout { display: flex; gap: 25px; align-items: flex-start; margin-top: 10px; }
        .cctv-grid { flex: 3; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .cctv-box { background: #1a1a24; border-radius: 8px; border: 3px solid #e2e8f0; overflow: hidden; position: relative; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; }
        .cctv-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cctv-label { position: absolute; top: 12px; right: 12px; background: rgba(0, 0, 0, 0.7); padding: 6px 12px; border-radius: 6px; color: white; font-weight: bold; font-size: 12px; z-index: 10; display: flex; gap: 8px; align-items: center;}
        .badge-hijau { background-color: #28a745; padding: 2px 8px; border-radius: 4px; color: #fff;}
        .badge-merah { background-color: #dc3545; padding: 2px 8px; border-radius: 4px; color: #fff;}
        
        .side-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 320px; }
        .ticket-view { background: #fffdf5; color: #333; padding: 20px; border-radius: 10px; border: 2px dashed #ffc107; min-height: 230px; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        
        /* SETUP ROI SECTION */
        #setup-section { display: none; background: #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        .canvas-container { position: relative; width: 100%; max-width: 800px; margin: 15px auto; border: 2px solid #333; aspect-ratio: 16/9; background-color: #000;}
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
        #reference-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; display: none;}
        
        /* --- GAYA STRUK THERMAL PARKIR --- */
        .receipt-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; }
        .thermal-receipt { background-color: #fff; width: 100%; max-width: 280px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); font-family: 'Courier New', Courier, monospace; color: #000; text-align: left; position: relative; border: 1px solid #ddd; }
        .thermal-receipt::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background: linear-gradient(135deg, #fff 5px, transparent 5px), linear-gradient(-135deg, #fff 5px, transparent 5px); background-position: left bottom; background-repeat: repeat-x; background-size: 10px 10px; }
        .receipt-header { text-align: center; margin-bottom: 15px; }
        .receipt-header h2 { margin: 0; font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .receipt-header p { margin: 5px 0 0 0; font-size: 11px; }
        .receipt-divider { border-top: 2px dashed #000; margin: 12px 0; }
        .receipt-details { font-size: 13px; line-height: 1.6; }
        .receipt-slot { text-align: center; margin: 15px 0; border: 2px solid #000; padding: 10px; border-radius: 4px; }
        .receipt-slot p { margin: 0 0 5px 0; font-size: 12px; font-weight: bold; }
        .receipt-slot h1 { font-size: 55px; margin: 0; font-weight: 900; color: #28a745; }
        .receipt-barcode { text-align: center; margin-top: 15px; }
        .receipt-barcode img { width: 100%; height: 60px; object-fit: contain; } /* Menggunakan img untuk barcode */
        .receipt-footer { text-align: center; font-size: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #222;">🎛️ Sistem Monitoring CCTV & Gate Karcis Parkir</h1>
    
    <div class="top-bar">
        <button class="btn-setup" onclick="toggleSetupMode()">📐 1. SETUP AREA PARKIR (ROI)</button>
        <button class="btn-connect" onclick="hubungkanSemuaCCTV()">🔌 2. AKTIFKAN MONITOR</button>
        <button class="btn-ticket" onclick="requestCetakTiket()">🎫 3. CETAK TIKET MASUK</button>
    </div>

    <div id="setup-section">
        <h3 style="margin-top:0;">Mode Mapping Area Parkir (ROI)</h3>
        <p style="font-size: 14px; margin-bottom: 10px;">Pilih Kamera: 
            <select id="kamera-select">
                <option value="1">Kamera (Area A)</option>
                <option value="2">Kamera (Area B)</option>
            </select>
            <button onclick="loadFrameCamera()" style="background: #333; padding: 6px 12px; font-size: 12px;">Ambil Frame Kamera</button>
        </p>

        <div class="canvas-container">
            <img id="reference-img" alt="Frame Referensi">
            <canvas id="roi-canvas" width="1280" height="720"></canvas>
        </div>

        <div style="text-align: center;">
            <p style="font-size: 13px; color: #555;">Klik 4 kali pada layar untuk membentuk 1 slot parkir.</p>
            <button class="btn-action" onclick="undoLastPoint()">↩️ Undo Titik</button>
            <button class="btn-action" onclick="clearAllPolygons()">🗑️ Hapus Semua</button>
            <button class="btn-connect" style="padding: 8px 15px; font-size: 13px;" onclick="simpanROIKeserver()">💾 Simpan & Terapkan ke Server</button>
        </div>
    </div>

    <div class="main-layout" id="live-section">
        <div class="cctv-box">
                <div class="cctv-label">
                    <span>🔴 LIVE AREA A</span>
                    <span class="badge-hijau" id="kosong-cam1">Kosong: 0</span>
                    <span class="badge-merah" id="terisi-cam1">Terisi: 0</span>
                </div>
                <img id="cam1" alt="CCTV Monitor 1">
            </div>
            <div class="cctv-box">
                <div class="cctv-label">
                    <span>🔴 LIVE AREA B</span>
                    <span class="badge-hijau" id="kosong-cam2">Kosong: 0</span>
                    <span class="badge-merah" id="terisi-cam2">Terisi: 0</span>
                </div>
                <img id="cam2" alt="CCTV Monitor 2">
            </div>

        <div class="side-panel">
            <div class="ticket-view" id="tiketResult">
                <h3 style="color: #777; font-weight: 500; margin: 0;">Menunggu Pemicu Sensor Gate...</h3>
            </div>
            <div id="download-status" style="margin-top: 10px; font-size: 13px; color: #28a745; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ URL
    const baseUrl = "http://bore.pub:10265"
    let isLive = false;
    let statusInterval;

    // ==========================================
    // LOGIKA LIVE CCTV & TIKET
    // ==========================================
    function hubungkanSemuaCCTV() {
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('live-section').style.display = 'flex';

        const cam1 = document.getElementById('cam1');
        const cam2 = document.getElementById('cam2');
        
        // Membuka stream video dari Colab
        cam1.src = `${baseUrl}/video_feed/1`;
        cam2.src = `${baseUrl}/video_feed/2`;
        cam1.style.display = "block";
        cam2.style.display = "block";
        isLive = true;

        if (statusInterval) clearInterval(statusInterval);
        statusInterval = setInterval(fetchStatusArea, 2000);
        fetchStatusArea();
    }

    async function fetchStatusArea() {
        if (!isLive) return;
        try {
            const response = await fetch(`${baseUrl}/status_area`);
            const data = await response.json();

            // Update Angka Kamera 1 (Area A)
            document.getElementById('kosong-cam1').innerText = `Kosong: ${data["1"].kosong}`;
            document.getElementById('terisi-cam1').innerText = `Terisi: ${data["1"].terisi}`;

            // Update Angka Kamera 2 (Area B)
            document.getElementById('kosong-cam2').innerText = `Kosong: ${data["2"].kosong}`;
            document.getElementById('terisi-cam2').innerText = `Terisi: ${data["2"].terisi}`;
        } catch (error) {
            console.log("Gagal mengambil status area", error);
        }
    }
    
    async function requestCetakTiket() {
        if (!isLive) { alert("Nyalakan koneksi monitor CCTV terlebih dahulu!"); return; }
        
        const tiketContainer = document.getElementById('tiketResult');
        const statusContainer = document.getElementById('download-status');
        
        tiketContainer.innerHTML = "<i style='color:#777;'>Memproses tiket & mencari slot kosong...</i>";
        statusContainer.innerText = "";

        try {
            const response = await fetch(`${baseUrl}/cetak_tiket`, { method: "POST" });
            const data = await response.json();

            if (data.status === "penuh") {
                tiketContainer.innerHTML = `<h2 style='color:#dc3545; text-align:center;'>🚨<br>MOHON MAAF<br>PARKIR PENUH!</h2>`;
            } else {
                const now = new Date();
                const tgl = now.toLocaleDateString('id-ID');
                const jam = now.toLocaleTimeString('id-ID');
                const randomID = Math.floor(1000 + Math.random() * 9000);
                const ticketID = `PK-${now.getFullYear()}-${randomID}`;

                tiketContainer.innerHTML = `
                    <div class="receipt-wrapper">
                        <div class="thermal-receipt" id="receipt-to-pdf">
                            <div class="receipt-header">
                                <h2>SMART PARKING</h2>
                                <p>Jl. Teknologi Informatika No. 1</p>
                            </div>
                            <div class="receipt-divider"></div>
                            <div class="receipt-details">
                                <div><b>No Tiket :</b> ${ticketID}</div>
                                <div><b>Tanggal  :</b> ${tgl}</div>
                                <div><b>Jam Masuk:</b> ${jam} WIB</div>
                                <div><b>Gate     :</b> UTAMA-01</div>
                            </div>
                            <div class="receipt-divider"></div>
                            <div class="receipt-slot">
                                <p>LOKASI PARKIR ANDA:</p>
                                <h1>${data.slot}</h1>
                            </div>
                            <div class="receipt-barcode">
                                <img id="barcode"></img>
                            </div>
                            <div class="receipt-footer">
                                <p>JANGAN TINGGALKAN TIKET<br>DAN BARANG BERHARGA DI KENDARAAN</p>
                            </div>
                        </div>
                    </div>
                `;

                // Render Barcode
                JsBarcode("#barcode", ticketID, {
                    format: "CODE128",
                    lineColor: "#000",
                    width: 2,
                    height: 40,
                    displayValue: true,
                    fontSize: 14,
                    fontOptions: "bold"
                });

                // Proses generate PDF
                statusContainer.innerText = "⏳ Sedang membuat file PDF...";
                
                // Beri sedikit waktu delay agar font dan gambar barcode ter-render di DOM
                setTimeout(() => {
                    const element = document.getElementById('receipt-to-pdf');
                    
                    // Opsi untuk PDF
                    const opt = {
                        margin:       0.2, // margin inci
                        filename:     `Tiket_Parkir_${ticketID}.pdf`,
                        image:        { type: 'jpeg', quality: 1 },
                        html2canvas:  { scale: 2 }, // Resolusi HD
                        jsPDF:        { unit: 'in', format: 'a6', orientation: 'portrait' } // Format kecil ala karcis
                    };

                    // Konversi dan unduh otomatis
                    html2pdf().set(opt).from(element).save().then(() => {
                        statusContainer.innerText = `✅ Tiket ${ticketID}.pdf berhasil diunduh!`;
                        setTimeout(() => { statusContainer.innerText = ""; }, 5000); // Hilangkan pesan setelah 5 detik
                    });
                }, 500); 

            }
        } catch (error) {
            tiketContainer.innerHTML = `<p style='color:#dc3545; text-align:center;'><b>Koneksi Gagal.</b><br><small>Pastikan Colab & Ngrok berjalan.</small></p>`;
        }
    }

    // ==========================================
    // LOGIKA SETUP ROI / POLYGON MAPPING
    // ==========================================
    const canvas = document.getElementById('roi-canvas');
    const ctx = canvas.getContext('2d');
    let currentPoints = [];
    let savedSlots = [];

    function toggleSetupMode() {
        const setupDiv = document.getElementById('setup-section');
        const liveDiv = document.getElementById('live-section');
        
        if (setupDiv.style.display === 'none' || setupDiv.style.display === '') {
            setupDiv.style.display = 'block';
            liveDiv.style.display = 'none';
        } else {
            setupDiv.style.display = 'none';
            liveDiv.style.display = 'flex';
        }
    }

    function loadFrameCamera() {
        const camId = document.getElementById('kamera-select').value;
        const imgRef = document.getElementById('reference-img');
        imgRef.src = `${baseUrl}/get_frame/${camId}?t=${new Date().getTime()}`; 
        imgRef.style.display = 'block';
        clearAllPolygons(); 
    }

    canvas.addEventListener('mousedown', function(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = Math.round((e.clientX - rect.left) * scaleX);
        const y = Math.round((e.clientY - rect.top) * scaleY);

        currentPoints.push([x, y]);

        if (currentPoints.length === 4) {
            savedSlots.push([...currentPoints]);
            currentPoints = [];
        }
        redrawCanvas();
    });

    function undoLastPoint() {
        if (currentPoints.length > 0) {
            currentPoints.pop();
        } else if (savedSlots.length > 0) {
            savedSlots.pop(); 
        }
        redrawCanvas();
    }

    function clearAllPolygons() {
        currentPoints = [];
        savedSlots = [];
        redrawCanvas();
    }

    function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        savedSlots.forEach(slot => {
            ctx.beginPath();
            ctx.moveTo(slot[0][0], slot[0][1]);
            for(let i = 1; i < 4; i++) {
                ctx.lineTo(slot[i][0], slot[i][1]);
            }
            ctx.closePath();
            ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
            ctx.fill();
            ctx.strokeStyle = "#00FF00";
            ctx.lineWidth = 3;
            ctx.stroke();
        });

        if (currentPoints.length > 0) {
            ctx.beginPath();
            ctx.moveTo(currentPoints[0][0], currentPoints[0][1]);
            for(let i = 1; i < currentPoints.length; i++) {
                ctx.lineTo(currentPoints[i][0], currentPoints[i][1]);
            }
            ctx.strokeStyle = "#FF0000";
            ctx.lineWidth = 3;
            ctx.stroke();

            currentPoints.forEach(p => {
                ctx.beginPath();
                ctx.arc(p[0], p[1], 5, 0, Math.PI * 2);
                ctx.fillStyle = "#FF0000";
                ctx.fill();
            });
        }
    }

    async function simpanROIKeserver() {
        if (savedSlots.length === 0) {
            alert("Anda belum membuat kotak parkir satupun!");
            return;
        }

        const camId = document.getElementById('kamera-select').value;
        const payload = {
            camera_id: camId,
            rois: savedSlots
        };

        try {
            const response = await fetch(`${baseUrl}/update_roi`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Data ROI berhasil disimpan di server! Anda sekarang bisa mengaktifkan monitor.");
            } else {
                alert("Gagal menyimpan ROI.");
            }
        } catch (error) {
            alert("Koneksi ke backend gagal.");
        }
    }
</script>

</body>
</html>
